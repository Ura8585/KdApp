version: '3.8'

services:
  webapi:
    build:
      context: .
      dockerfile: Kdbapp/Dockerfile
    container_name: kdb-app-container
    ports:
      - "8968:8080"
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Если БД крутится на том же сервере вне докера, разрешаем доступ к хосту:
    extra_hosts:
      - "host.docker.internal:host-gateway"